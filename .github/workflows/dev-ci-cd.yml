name: Build and Deploy Agent
on:
  workflow_dispatch:
  push:
    branches:
      - "main"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        run: |
          echo "image_name=ghcr.io/${{ github.repository_owner }}/procurement-status-chatbot" >> $GITHUB_OUTPUT
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "image_tag_latest=latest" >> $GITHUB_OUTPUT
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag_latest }}
          build-args: |
            ARTIFACTORY_USER=${{ secrets.ARTIFACTORY_USER }}
            ARTIFACTORY_TOKEN=${{ secrets.ARTIFACTORY_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Deployment Info
        run: |
          echo "✅ Docker image built and pushed successfully!"
          echo ""
          echo "📦 Image Details:"
          echo "  Registry: GitHub Container Registry (ghcr.io)"
          echo "  Image: ${{ steps.meta.outputs.image_name }}"
          echo "  Tags:"
          echo "    - ${{ steps.meta.outputs.image_tag }} (commit SHA)"
          echo "    - ${{ steps.meta.outputs.image_tag_latest }} (latest)"
          echo ""
          echo "🔗 View your image at:"
          echo "  https://github.com/${{ github.repository }}/pkgs/container/procurement-status-chatbot"
          echo ""
          echo "📋 Next steps:"
          echo "  1. Your container image is now publicly available"
          echo "  2. Deploy to App Foundation using the image URL above"
          echo "  3. Update your app.yaml if needed to reference this image"
